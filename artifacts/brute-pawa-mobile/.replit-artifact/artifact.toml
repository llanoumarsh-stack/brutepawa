kind = "mobile"
previewPath = "/mobile/"
title = "Brute Pawa Mobile"
version = "1.0.0"
id = "artifacts/brute-pawa-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22245

[services.development]
run = "pnpm --filter @workspace/brute-pawa-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brute-pawa-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/brute-pawa-mobile", "run", "serve" ]

[services.env]
PORT = "22245"
BASE_PATH = "/mobile/"
