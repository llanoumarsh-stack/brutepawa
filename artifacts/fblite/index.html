<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Brute Pawa</title>
    <meta name="description" content="Brute Pawa — La plateforme sociale, professionnelle et commerciale de référence en Afrique francophone." />
    <meta name="robots" content="index, follow" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Brute Pawa" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Brute Pawa" />
    <meta property="og:description" content="Brute Pawa — La plateforme sociale, professionnelle et commerciale de référence en Afrique francophone." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brute Pawa" />
    <meta name="twitter:description" content="Brute Pawa — La plateforme sociale, professionnelle et commerciale de référence en Afrique francophone." />

    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('[SW] registered', reg.scope);
              navigator.serviceWorker.addEventListener('message', (e) => {
                if (e.data?.type === 'bp:incoming-call') {
                  window.dispatchEvent(new CustomEvent('bp:incoming-call', { detail: e.data.data }));
                }
              });
            })
            .catch(err => console.warn('[SW] registration failed', err));
        });
      }
    </script>
  </body>
</html>
